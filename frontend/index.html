<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TokenTrend — Basic</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📈 TokenTrend Basic</h1>
      <p id="status">Loading live data...</p>
    </header>

    <main>
      <!-- Controls -->
      <div class="control-panel">
        <label for="tokenSelect">Select Cryptocurrency:</label>
        <select id="tokenSelect"></select>
        <button id="refreshBtn">Refresh Data</button>
      </div>

      <!-- Data Display -->
      <div class="data-panel" id="dataPanel" style="display:none;">
        <h2>Current Market Data</h2>
        <p><strong>Price:</strong> <span id="priceVal"></span></p>
        <p><strong>24h Change:</strong> <span id="changeVal"></span></p>
        <p><strong>Market Cap:</strong> <span id="mcapVal"></span></p>
        <p><strong>24h Volume:</strong> <span id="volumeVal"></span></p>
        
        <h2>🤖 AI Prediction</h2>
        <div class="prediction-box">
          <p><strong>Direction:</strong> <span id="predDir"></span></p>
          <p><strong>Confidence:</strong> <span id="predConf"></span></p>
          <p><strong>Signal:</strong> <span id="predSignal"></span></p>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
